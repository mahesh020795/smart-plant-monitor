name: smart_plant_monitor
description: ESP32 Smart Plant Monitoring & Automated Irrigation App
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
